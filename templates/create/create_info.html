{% extends 'home.html' %}
{% block content %}
<style>
    .container {
        max-width: 500px;
        margin: 50px auto;
    }

    .card {
        background: #fff;
        padding: 30px 25px;
        border-radius: 15px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        text-align: center;
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    .card h2 {
        margin-bottom: 20px;
        color: #1a1a1a;
        font-size: 24px;
    }

    .card form p {
        text-align: left;
        margin-bottom: 15px;
    }

    .card button {
        width: 100%;
        padding: 12px;
        background: #1976d2;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .card button:hover {
        background: #1565c0;
        transform: translateY(-2px);
    }

    .card .cancel {
        display: inline-block;
        margin-top: 12px;
        text-decoration: none;
        color: #555;
        transition: color 0.3s ease;
    }

    .card .cancel:hover {
        color: #000;
    }

    @media (max-width: 600px) {
        .card {
            padding: 20px 15px;
        }

        .card h2 {
            font-size: 22px;
        }

        .card button {
            font-size: 15px;
        }
    }
</style>

<div class="container">
    <div class="card">
        <h2>{{ form.instance.pk|yesno:"Update Student,Create Student" }}</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save</button>
        </form>
        <a href="{% url 'home-page' %}" class="cancel">Cancel</a>
    </div>
</div>

{% endblock %}
